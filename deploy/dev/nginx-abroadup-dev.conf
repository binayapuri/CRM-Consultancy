# Abroad Up — production-style reverse proxy (Node on 127.0.0.1:4000)
#
# Hostnames (all can point to the same VPS):
#   - abroadup.online + www.abroadup.online  (use first for Let’s Encrypt if .com DNS not ready)
#   - abroadup.com + www.abroadup.com        (add to the same cert when DNS verifies — see DEPLOY_DEV.md)
#
# SSL: After `certbot`, certificate paths are usually under:
#   /etc/letsencrypt/live/<first-domain-in-certbot>/
# Expand later: certbot certonly --nginx --expand -d abroadup.online -d www.abroadup.online -d abroadup.com -d www.abroadup.com

server {
  listen 80;
  listen [::]:80;
  server_name abroadup.com www.abroadup.com abroadup.online www.abroadup.online;

  # Let’s Encrypt HTTP-01 (must not redirect the challenge request)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name abroadup.com www.abroadup.com abroadup.online www.abroadup.online;

  # Update this path to match `certbot` output (often the first -d domain you used).
  ssl_certificate /etc/letsencrypt/live/abroadup.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/abroadup.online/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
