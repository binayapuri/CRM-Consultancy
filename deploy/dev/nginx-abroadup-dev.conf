# Abroad Up — reverse proxy without requiring TLS files on disk.
# Works on first deploy (http://your-domain → Node on 127.0.0.1:4000).
#
# HTTPS: On the VPS, after DNS works, run:
#   sudo certbot --nginx -d abroadup.online -d www.abroadup.online
#   (add -d abroadup.com -d www.abroadup.com when ready)
# Certbot will add SSL server blocks. Then create a marker so deploys don't overwrite:
#   sudo touch /etc/nginx/.abroadup-keep-nginx
# See docs/DEPLOY_DEV.md

server {
  listen 80;
  listen [::]:80;
  server_name abroadup.com www.abroadup.com abroadup.online www.abroadup.online;

  client_max_body_size 25m;

  # Let’s Encrypt HTTP-01 (Certbot may use this path)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
