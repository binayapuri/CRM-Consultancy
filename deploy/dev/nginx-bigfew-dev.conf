server {
  listen 80;
  server_name bigfew.com www.bigfew.com;

  # Always redirect HTTP → HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name bigfew.com www.bigfew.com;

  # Certbot places certs here by default. Run certbot once to create them,
  # future deploys just reuse these files (no need to rerun certbot).
  ssl_certificate /etc/letsencrypt/live/bigfew.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bigfew.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Increase if you upload larger docs
  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

